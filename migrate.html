function log(msg,type=''){
  const el=document.getElementById('log');
  const div=document.createElement('div');
  div.style.color=type==='ok'?'#6fcf97':type==='err'?'#ff6b6b':'#e2c97e';
  div.textContent=msg;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}

async function start(){
  log('Testing connection...');
  const test=await fetch(ANDREA_URL+'/rest/v1/manual_payments',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':ANDREA_KEY,'Authorization':'Bearer '+ANDREA_KEY,'Prefer':'return=minimal'},
    body:JSON.stringify({id:crypto.randomUUID(),user_id:USER_ID,client:'TEST_DELETE_ME',supplier:'test',paid_date:'1/1/2024',year:2024,amount:0.01})
  });
  
  if(!test.ok){
    log('✗ Test failed: '+test.status+' — run the SQL grant first.','err');
    return;
  }
  log('✓ Connection works! Starting migration...','ok');
  
  if(!confirm('Insert 165 records?'))return;
  document.getElementById('btn').disabled=true;

  // Clean up test
  await fetch(ANDREA_URL+'/rest/v1/manual_payments?client=eq.TEST_DELETE_ME',{method:'DELETE',headers:{'apikey':ANDREA_KEY,'Authorization':'Bearer '+ANDREA_KEY}});

  let ok=0,fail=0;
  for(let i=0;i<records.length;i++){
    const r=records[i];
    try{
      const res=await fetch(ANDREA_URL+'/rest/v1/manual_payments',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':ANDREA_KEY,'Authorization':'Bearer '+ANDREA_KEY,'Prefer':'return=minimal'},
        body:JSON.stringify({id:crypto.randomUUID(),user_id:USER_ID,client:r.client||null,supplier:r.sup||r.dest||null,ref:r.ref||null,paid_date:r.paid||null,year:r.y||2024,amount:parseFloat(r.amt)||0,notes:r.notes||null})
      });
      if(res.ok){ok++;if(ok%10===0||i===records.length-1)log('✓ '+ok+' inserted','ok');}
      else{fail++;log('✗ Record '+(i+1)+' ('+r.client+'): '+res.status,'err');}
    }catch(e){fail++;log('✗ '+e.message,'err');}
    document.getElementById('bar').style.width=((i+1)/records.length*100)+'%';
    document.getElementById('status').textContent=(i+1)+'/'+records.length+' — '+ok+' ok, '+fail+' failed';
    await new Promise(r=>setTimeout(r,30));
  }
  log('');
  log('Done! '+ok+' succeeded, '+fail+' failed.',ok>0?'ok':'err');
  document.getElementById('btn').disabled=false;
}
